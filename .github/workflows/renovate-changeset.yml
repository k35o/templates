name: Renovate Changeset

# Renovate dependency-bump PRs carry no changeset by design (see ci.yml), so
# without help their updates land on main but never get released. This workflow
# attaches a patch changeset to Renovate PRs whenever the update affects the
# *published* package — i.e. runtime `dependencies` or the template versions in
# src/versions.ts. devDependency-only bumps are intentionally left alone.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: renovate-changeset-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  add-changeset:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.K35O_BOT_CLIENT_ID }}
          private-key: ${{ secrets.K35O_BOT_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Detect release-relevant changes
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          BASE="origin/${BASE_REF}"

          relevant=false

          # Runtime dependencies are shipped to consumers — compare just that block.
          if ! diff -q \
            <(git show "${BASE}:package.json" | jq -S '.dependencies // {}') \
            <(jq -S '.dependencies // {}' package.json) >/dev/null 2>&1; then
            echo "Runtime dependencies changed."
            relevant=true
          fi

          # Template versions get baked into generated projects.
          if ! git diff --quiet "${BASE}" -- src/versions.ts; then
            echo "src/versions.ts changed."
            relevant=true
          fi

          echo "relevant=${relevant}" >> "$GITHUB_OUTPUT"

      - name: Create and push changeset
        if: steps.detect.outputs.relevant == 'true'
        env:
          PR_NUMBER: ${{ github.event.number }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          PKG=$(jq -r '.name' package.json)
          FILE=".changeset/renovate-${PR_NUMBER}.md"
          {
            echo "---"
            # Single-quoted: the oxc formatter (vp check) normalizes YAML
            # frontmatter to single quotes, so double quotes fail CI fmt.
            echo "'${PKG}': patch"
            echo "---"
            echo ""
            echo "Update bundled dependencies via Renovate."
          } > "$FILE"

          git add "$FILE"
          # Idempotent: re-runs (synchronize) produce identical content, so there
          # is nothing to commit and no push loop.
          if git diff --cached --quiet; then
            echo "Changeset already present and up to date."
            exit 0
          fi

          # Commit as the k8o-bot GitHub App (the token above is minted from it).
          # This author MUST stay in sync with gitIgnoredAuthors in renovate.json;
          # otherwise Renovate sees the branch as user-edited and stops updating it.
          git config user.name "k8o-bot[bot]"
          git config user.email "268958302+k8o-bot[bot]@users.noreply.github.com"
          git commit -m "chore: add changeset for dependency update"
          git push origin "HEAD:${HEAD_REF}"
