name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Lint / Format / Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run check (fmt + lint)
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run tests
        run: pnpm test

  changeset:
    name: Changeset
    # Dependency bumps (Renovate) and the release PR carry no changeset by design;
    # skipping the job is treated as success by branch protection.
    if: github.actor != 'renovate[bot]' && github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Verify a changeset is present
        run: pnpm exec changeset status --since=origin/main
